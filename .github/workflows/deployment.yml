name: Practice Deployment Workflow
on: push
jobs:

  Pre-Deployment-job:
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/checkout@v3

      - name: Install Latest NodeJS
        uses: actions/setup-node@v3
        with:
          node-version: 24
      - name: Install Dependencies
        run: npm CI

      - name: linting test
        run: npm run lint

      - name: unit test cases
        run: npm run test

  deployment:
    runs-on: ubuntu-latest
    needs: Pre-Deployment-job
    steps:
      - name: deployment time ⌚
        run: echo "Deploying to Mars 🚀"